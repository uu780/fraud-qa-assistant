<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>防诈骗问答助手</title>
</head>
<body>
    <h1>🛡️ 防诈骗问答助手</h1>
    <hr>

    <!-- 对话历史显示区域 -->
    <div id="chatBox" style="border:1px solid #ccc; height:400px; overflow-y:scroll; padding:10px; margin-bottom:10px;">
        <p><strong>🤖 助手：</strong>你好！请问有什么可以帮助你的？</p>
    </div>

    <!-- 输入区域 -->
    <input type="text" id="question" style="width:70%; padding:8px;" placeholder="输入你的问题...">
    <button onclick="sendQuestion()">发送</button>
    <button onclick="clearHistory()">清空对话</button>

    <script>
        // 发送问题
        async function sendQuestion() {
            let input = document.getElementById('question');
            let query = input.value.trim();
            if (query === '') return;

            // 显示用户的问题
            let chatBox = document.getElementById('chatBox');
            chatBox.innerHTML += '<p><strong>👤 你：</strong>' + query + '</p>';
            input.value = '';

            // 显示"正在思考..."
            let thinkingId = Date.now();
            chatBox.innerHTML += '<p id="msg' + thinkingId + '"><strong>🤖 助手：</strong>思考中...</p>';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // 调用后端接口
                let response = await fetch('/stream_response?query=' + encodeURIComponent(query));
                let answer = await response.text();

                // 替换思考中的消息为实际回答
                document.getElementById('msg' + thinkingId).innerHTML = '<strong>🤖 助手：</strong>' + answer;
            } catch (error) {
                document.getElementById('msg' + thinkingId).innerHTML = '<strong>🤖 助手：</strong>网络错误，请检查服务是否运行';
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 清空对话历史
        async function clearHistory() {
            await fetch('/history', { method: 'DELETE' });
            document.getElementById('chatBox').innerHTML = '<p><strong>🤖 助手：</strong>对话已清空，请问有什么可以帮助你的？</p>';
        }

        // 按回车键发送
        document.getElementById('question').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendQuestion();
        });
    </script>
</body>
</html>
